{% extends 'base.html' %}
{% block title %}{{ page_title }} – Mission Control{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-4 pb-3 border-bottom border-primary border-opacity-25 mt-2">
    <h4 class="fw-800 text-primary mb-0"><i class="bi bi-building me-2"></i>{{ page_title }}</h4>
    <a href="{% url 'manage_beds' %}" class="btn btn-outline-primary btn-sm rounded-pill fw-700">
        <i class="bi bi-arrow-left me-1"></i> Back to Bed Control
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="hms-card">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-800 small text-muted text-uppercase">Ward Name</label>
                            {{ form.name }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-800 small text-muted text-uppercase">Ward Type</label>
                            {{ form.ward_type }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-800 small text-muted text-uppercase">Bed Capacity</label>
                            {{ form.capacity }}
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-800 small text-muted text-uppercase">Ward Manager</label>
                            {{ form.manager }}
                        </div>
                    </div>
                    <div class="mt-5 pt-3 border-top d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-5 fw-800 rounded-pill">Save Changes</button>
                        <a href="{% url 'manage_beds' %}" class="btn btn-light border px-4 fw-800 rounded-pill">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
