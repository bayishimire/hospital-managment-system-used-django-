{% extends 'base.html' %}
{% block body_class %}no-sidebar{% endblock %}
{% block title %}Access Denied – HMS Pro{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:80vh;">
  <div class="text-center p-5">
    <div style="width:100px;height:100px;background:rgba(244,67,54,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:3rem;color:#f44336;">
      <i class="bi bi-shield-x-fill"></i>
    </div>
    <h2 class="fw-800" style="color:#1a3c5e;">No Dashboard Assigned</h2>
    <p class="text-muted">Your account does not have a role assigned yet. Please contact the system administrator.</p>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <a href="{% url 'logout' %}" class="btn btn-outline-danger"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
  </div>
</div>
{% endblock %}
